<svg width="960" height="260" viewBox="0 0 960 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GABES logo draft</title>
  <desc id="desc">A modern vector logo concept for the Generic Atomic Bloch Equation Solver, combining an atomic level scheme mark with a spectral solver wordmark.</desc>
  <defs>
    <linearGradient id="beamCyan" x1="58" y1="157" x2="126" y2="59" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="beamRed" x1="89" y1="158" x2="157" y2="59" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="wordAccent" x1="276" y1="155" x2="646" y2="155" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.45" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <marker id="arrowCyan" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L8 4.5L1 8Z" fill="#22D3EE"/>
    </marker>
    <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L8 4.5L1 8Z" fill="#F43F5E"/>
    </marker>
    <style>
      .ink { stroke: #101827; }
      .muted { stroke: #8A9AAF; }
      .level { stroke: #101827; stroke-width: 7; stroke-linecap: round; }
      .thin { stroke-width: 2.25; stroke-linecap: round; stroke-linejoin: round; }
      .beam { stroke-width: 6.5; stroke-linecap: round; stroke-linejoin: round; }
      .word { fill: #101827; font-family: "IBM Plex Sans", "Inter", "Segoe UI", Arial, sans-serif; font-size: 82px; font-weight: 740; letter-spacing: 0; }
      .tagline { fill: #526174; font-family: "IBM Plex Sans", "Inter", "Segoe UI", Arial, sans-serif; font-size: 21px; font-weight: 500; letter-spacing: 0; }
      .micro { fill: #526174; font-family: "IBM Plex Mono", "Cascadia Mono", "SFMono-Regular", Consolas, monospace; font-size: 13px; font-weight: 600; letter-spacing: 0; }
    </style>
  </defs>

  <g transform="translate(48 30)">
    <circle cx="100" cy="100" r="92" stroke="#DCE6EF" stroke-width="2.5"/>
    <path d="M34 40C70 17 129 17 166 40" class="muted thin" opacity="0.55"/>
    <path d="M34 160C70 183 129 183 166 160" class="muted thin" opacity="0.55"/>
    <path d="M16 100C16 78 24 57 39 40" class="muted thin" opacity="0.5"/>
    <path d="M184 100C184 122 176 143 161 160" class="muted thin" opacity="0.5"/>

    <line x1="42" y1="62" x2="116" y2="62" class="level"/>
    <line x1="84" y1="93" x2="158" y2="93" class="level"/>
    <line x1="42" y1="139" x2="116" y2="139" class="level"/>
    <line x1="84" y1="170" x2="158" y2="170" class="level"/>

    <path d="M58 155L104 70" stroke="url(#beamCyan)" class="beam" marker-end="url(#arrowCyan)"/>
    <path d="M96 155C112 128 130 101 148 76" stroke="url(#beamRed)" class="beam" marker-end="url(#arrowRed)"/>
    <path d="M50 94C80 119 121 119 150 94" stroke="#6D5DF7" class="thin"/>
    <path d="M49 139C79 116 121 116 151 139" stroke="#14B8A6" class="thin"/>

    <circle cx="42" cy="62" r="4.5" fill="#101827"/>
    <circle cx="116" cy="62" r="4.5" fill="#101827"/>
    <circle cx="84" cy="170" r="4.5" fill="#101827"/>
    <circle cx="158" cy="170" r="4.5" fill="#101827"/>

    <path d="M35 194C47 194 48 181 59 181C70 181 69 202 80 202C91 202 91 181 103 181C115 181 114 194 127 194C140 194 140 188 153 188C164 188 166 194 176 194" stroke="#101827" class="thin"/>
    <path d="M61 194H76M130 194H145" stroke="#F43F5E" class="thin"/>
  </g>

  <g transform="translate(282 68)">
    <text x="0" y="76" class="word">GABES</text>
    <rect x="4" y="92" width="370" height="5" rx="2.5" fill="url(#wordAccent)"/>
    <text x="4" y="130" class="tagline">Generic Atomic Bloch Equation Solver</text>
    <g transform="translate(5 157)">
      <text x="0" y="0" class="micro">scheme-driven</text>
      <circle cx="124" cy="-4" r="3" fill="#22D3EE"/>
      <text x="142" y="0" class="micro">spectroscopy</text>
      <circle cx="254" cy="-4" r="3" fill="#F43F5E"/>
      <text x="272" y="0" class="micro">solver</text>
    </g>
  </g>
</svg>
